# This file contains linter configurations that will be used for Source Inc. projects.
# Note: default values are in the comments.
#
# Inspired by the exhaustive configuration options here:
# https://github.com/golangci/golangci-lint/blob/HEAD/.golangci.reference.yml


# Defines the configuration version.
# The only possible value is "2".
version: "2"


# Options for analysis running.
run:
  # Timeout for total work, e.g. 30s, 5m, 5m30s.
  # If the value is lower or equal to 0, the timeout is disabled.
  # Default: 0 (disabled)
  timeout: 15m

  # Number of operating system threads (`GOMAXPROCS`) that can execute golangci-lint simultaneously.
  # Default: 0 (automatically set to match Linux container CPU quota and
  # fall back to the number of logical CPUs in the machine)
  concurrency: 0

  # Define the Go version limit.
  # Default: use Go version from the go.mod file, fallback on the env var `GOVERSION`, fallback on 1.22.
  go: '1.25'

  # If set, we pass it to "go list -mod={option}". From "go help modules":
  # If invoked with -mod=readonly, the go command is disallowed from the implicit
  # automatic updating of go.mod described above. Instead, it fails when any changes
  # to go.mod are needed. This setting is most useful to check that go.mod does
  # not need updates, such as in a continuous integration and testing system.
  # If invoked with -mod=vendor, the go command assumes that the vendor
  # directory holds the correct copies of dependencies and ignores
  # the dependency descriptions in go.mod.
  #
  # Allowed values: readonly|vendor|mod
  # Default: ""
  modules-download-mode: mod

  # The mode used to evaluate relative paths.
  # It's used by exclusions, Go plugins, and some linters.
  # The value can be:
  # - `gomod`: the paths will be relative to the directory of the `go.mod` file.
  # - `gitroot`: the paths will be relative to the git root (the parent directory of `.git`).
  # - `cfg`: the paths will be relative to the configuration file.
  # - `wd` (NOT recommended): the paths will be relative to the place where golangci-lint is run.
  # Default: cfg
  relative-path-mode: gitroot

  # Exit code when at least one issue was found.
  # Default: 1
  issues-exit-code: 1

  # Include test files or not.
  # Default: true
  tests: true

  # List of build tags, all linters use it.
  # Default: []
  build-tags: []

  # Allow multiple parallel golangci-lint instances running.
  # If false, golangci-lint acquires file lock on start.
  # Default: false
  allow-parallel-runners: false

  # Allow multiple golangci-lint instances running, but serialize them around a lock.
  # If false, golangci-lint exits with an error if it fails to acquire file lock on start.
  # Default: false
  allow-serial-runners: false


# Output configuration options.
output:
  # Add a prefix to the output file references.
  # This option is ignored when using `output.path-mode: abs` mode.
  # Default: ""
  path-prefix: ""

  # By default, the report are related to the path obtained by `run.relative-path-mode`.
  # The mode `abs` allows to show absolute file paths instead of relative file paths.
  # The option `output.path-prefix` is ignored when using `abs` mode.
  # Default: ""
  path-mode: "abs"

  # Order to use when sorting results.
  # Possible values: `file`, `linter`, and `severity`.
  #
  # If the severity values are inside the following list, they are ordered in this order:
  #   1. error
  #   2. warning
  #   3. high
  #   4. medium
  #   5. low
  # Either they are sorted alphabetically.
  #
  # Default: ["linter", "file"]
  sort-order:
    - linter
    - severity
    - file # filepath, line, and column.

  # Show statistics per linter.
  # Default: true
  show-stats: true

  # The formats used to render issues.
  formats:
    # Prints issues in a text format with colors, line number, and linter name.
    # This format is the default format.
    text:
      # Output path can be either `stdout`, `stderr` or path to the file to write to.
      # Default: stdout
      path: stdout
      # Print linter name in the end of issue text.
      # Default: true
      print-linter-name: true
      # Print lines of code with issue.
      # Default: true
      print-issued-lines: true
      # Use colors.
      # Default: true
      colors: true

    # # Prints issues in a JSON representation.
    # json:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: stdout

    # # Prints issues in columns representation separated by tabulations.
    # tab:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: stdout
    #   # Print linter name in the end of issue text.
    #   # Default: true
    #   print-linter-name: true
    #   # Use colors.
    #   # Default: true
    #   colors: true

    # # Prints issues in an HTML page.
    # # It uses the Cloudflare CDN (cdnjs) and React.
    # html:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: ./lint.html

    # # Prints issues in the Checkstyle format.
    # checkstyle:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: stdout

    # # Prints issues in the Code Climate format.
    # code-climate:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: stdout

    # # Prints issues in the JUnit XML format.
    # junit-xml:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: stdout
    #   # Support extra JUnit XML fields.
    #   # Default: false
    #   extended: true

    # # Prints issues in the TeamCity format.
    # teamcity:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: stdout

    # # Prints issues in the SARIF format.
    # sarif:
    #   # Output path can be either `stdout`, `stderr` or path to the file to write to.
    #   # Default: stdout
    #   path: stdout


severity:
  # Set the default severity for issues.
  #
  # If severity rules are defined and the issues do not match or no severity is provided to the rule
  # this will be the default severity applied.
  # Severities should match the supported severity names of the selected out format.
  # - Code climate: https://docs.codeclimate.com/docs/issues#issue-severity
  # - Checkstyle: https://checkstyle.sourceforge.io/property_types.html#SeverityLevel
  # - GitHub: https://help.github.com/en/actions/reference/workflow-commands-for-github-actions#setting-an-error-message
  # - TeamCity: https://www.jetbrains.com/help/teamcity/service-messages.html#Inspection+Instance
  #
  # `@linter` can be used as severity value to keep the severity from linters (e.g. revive, gosec, ...)
  #
  # Default: ""
  default: error

  # When a list of severity rules are provided, severity information will be added to lint issues.
  # Severity rules have the same filtering capability as exclude rules
  # except you are allowed to specify one matcher per severity rule.
  #
  # `@linter` can be used as severity value to keep the severity from linters (e.g. revive, gosec, ...)
  #
  # Only affects out formats that support setting severity information.
  #
  # Default: []
  # rules:
  #   - linters:
  #       - dupl
  #     severity: info


issues:
  # Maximum issues count per one linter.
  # Set to 0 to disable.
  # Default: 50
  max-issues-per-linter: 0

  # Maximum count of issues with the same text.
  # Set to 0 to disable.
  # Default: 3
  max-same-issues: 0

  # Make issues output unique by line.
  # Default: true
  uniq-by-line: true

  # Show only new issues: if there are unstaged changes or untracked files,
  # only those changes are analyzed, else only changes in HEAD~ are analyzed.
  # It's a super-useful option for integration of golangci-lint into existing large codebase.
  # It's not practical to fix all existing issues at the moment of integration:
  # much better don't allow issues in new code.
  #
  # Default: false
  new: false

  # Show only new issues created after the best common ancestor (merge-base against HEAD).
  # Example: main
  # Default: ""
  new-from-merge-base: ""

  # Show only new issues created after git revision `REV`.
  # Example: HEAD
  # Default: ""
  new-from-rev: ""

  # Show only new issues created in git patch with set file path.
  # Example: path/to/patch/file
  # Default: ""
  new-from-patch: ""

  # Show issues in any part of update files (requires new-from-rev or new-from-patch).
  # Default: false
  whole-files: false

  # Fix found issues (if it's supported by the linter).
  # Default: false
  fix: false


formatters:
  # Enable specific formatter.
  # Default: [] (uses standard Go formatting)
  enable:
    - gofmt
    - goimports
    # If enabling these, don't forget to fetch their 'settings' and paste the config below:
    # - gci
    # - gofumpt
    # - golines
    # - swaggo

  # Formatters exclusions.
  exclusions:
    # Log a warning if an exclusion path is unused.
    # Default: false
    warn-unused: true

    # Mode of the generated files analysis.
    #
    # - `strict`: sources are excluded by strictly following the Go generated file convention.
    #    Source files that have lines matching only the following regular expression will be
    #    excluded: `^// Code generated .* DO NOT EDIT\.$`
    #    This line must appear before the first non-comment, non-blank text in the file.
    #    https://go.dev/s/generatedcode
    # - `lax`: sources are excluded if they contain lines like `autogenerated file`,
    #   `code generated`, `do not edit`, etc.
    # - `disable`: disable the generated files exclusion.
    #
    # Default: lax
    generated: lax

    # Which file paths to exclude.
    # This option is ignored when using `--stdin` as the path is unknown.
    # Example:
    #  - crypto/ssi-sdk.go
    # Default: []
    paths: []

  # Formatters settings.
  settings:
    gofmt:
      # Simplify code: gofmt with `-s` option.
      # Default: true
      simplify: true

      # Apply the rewrite rules to the source before reformatting.
      # https://pkg.go.dev/cmd/gofmt
      # Default: []
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
        - pattern: 'a[b:len(a)]'
          replacement: 'a[b:]'

    goimports:
      # A list of prefixes, which, if set, checks import paths
      # with the given prefixes are grouped after 3rd-party packages.
      # Default: []
      local-prefixes:
        - github.com/source-inc/
        - github.com/lens-vm/
        - github.com/sourcenetwork/
        - github.com/sourcenetwork/defradb


linters:
  # Default set of linters.
  # The value can be:
  # - `standard`: https://golangci-lint.run/docs/linters/#enabled-by-default
  # - `all`: enables all linters by default.
  # - `none`: disables all linters by default.
  # - `fast`: enables only linters considered as "fast", you can find a complete list by:
  #   (`golangci-lint help linters --json | jq '[ .[] | select(.fast==true) ] | map(.name)'`).
  # Default: standard
  default: none

  # Enable specific linter.
  enable:
    - dupword
    - errcheck
    - errorlint
    - forbidigo
    - forcetypeassert
    - goconst
    - goheader
    - govet
    - ineffassign
    - lll
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace

  # Disable specific linters.
  # disable:
  #  - whitespace

  # Linters exclusions. Defines a set of rules to ignore issues.
  # It does not skip the analysis, and so does not ignore "typecheck" errors.
  exclusions:
    # Mode of the generated files analysis.
    #
    # - `strict`: sources are excluded by strictly following the Go generated file convention.
    #    Source files that have lines matching only the following regular expression will be
    #    excluded: `^// Code generated .* DO NOT EDIT\.$`
    #    This line must appear before the first non-comment, non-blank text in the file.
    #    https://go.dev/s/generatedcode
    # - `lax`: sources are excluded if they contain lines like `autogenerated file`,
    #   `code generated`, `do not edit`, etc.
    # - `disable`: disable the generated files exclusion.
    #
    # Default: strict
    generated: lax

    # Log a warning if an exclusion rule is unused.
    # Default: false
    warn-unused: true

    # Excluding configuration per-path, per-linter, per-text and per-source.
    rules:
      # # Exclude some linters from running on tests files.
      # - path: _test\.go
      #   linters:
      #     - gocyclo
      #     - errcheck
      #     - dupl
      #     - gosec

      # # Exclude `lll` issues for long lines with `go:generate`.
      # - linters:
      #     - lll
      #   source: "^//go:generate "

      - linters:
          - goconst
          - errcheck
          - errorlint
          - lll
        path: (.+)_test\.go$

      - linters:
          - goheader
        path: (net|connor|encoding)

      - linters:
          - forcetypeassert
    # Exclude running force type assert check in these file paths, we are ignoring these files for now
    # because there are many linter complaints in them, we want to resolve all of them eventually.
    # TODO: https://github.com/sourcenetwork/defradb/issues/3154
    # Note: The last item must not have a `|` at the end otherwise linter ignores everyfile.
        path: "(\
             client/document.go|\
             client/normal_value_test.go|\
             net/grpc.go|\
             node/store_badger.go|\
             internal/connor/eq.go|\
             internal/core/block/block.go|\
             internal/core/block/block_test.go|\
             internal/core/key_test.go|\
             internal/core/view_item.go|\
             internal/db/backup.go|\
             internal/db/base/compare.go|\
             internal/db/collection.go|\
             internal/db/context.go|\
             internal/db/fetcher/indexer_iterators.go|\
             internal/db/index_test.go|\
             internal/db/indexed_docs_test.go|\
             internal/db/merge.go|\
             internal/db/merge_test.go|\
             internal/db/p2p_replicator.go|\
             internal/db/p2p_replicator_test.go|\
             internal/db/p2p_schema_root.go|\
             internal/db/p2p_schema_root_test.go|\
             internal/lens/fetcher.go|\
             internal/merkle/clock/clock.go|\
             internal/merkle/crdt/merklecrdt.go|\
             internal/planner/arbitrary_join.go|\
             internal/planner/filter/complex.go|\
             internal/planner/filter/copy.go|\
             internal/planner/filter/copy_field.go|\
             internal/planner/filter/copy_test.go|\
             internal/planner/filter/extract_properties.go|\
             internal/planner/filter/normalize.go|\
             internal/planner/filter/unwrap_relation.go|\
             internal/planner/group.go|\
             internal/planner/lens.go|\
             internal/planner/mapper/mapper.go|\
             internal/planner/mapper/targetable.go|\
             internal/planner/planner.go|\
             internal/planner/sum.go|\
             internal/planner/view.go|\
             internal/request/graphql/parser/commit.go|\
             internal/request/graphql/parser/filter.go|\
             internal/request/graphql/parser/mutation.go|\
             internal/request/graphql/parser/query.go|\
             internal/request/graphql/parser/request.go|\
             internal/request/graphql/schema/collection.go|\
             internal/request/graphql/schema/generate.go|\
             tests/gen|\
             tests/integration/utils.go|\
             tests/integration/explain.go|\
             tests/integration/events.go|\
             tests/integration/acp.go|\
             tests/integration/schema/default_fields.go|\
             tests/predefined/gen_predefined.go\
             )"

    # Which file paths to exclude: they will be analyzed, but issues from them won't be reported.
    # "/" will be replaced by the current OS file path separator to properly work on Windows.
    # Default: []
    paths:
      - crypto/ssi-sdk.go

    # Which file paths to not exclude.
    # Example:
    #  - lib/bad.go
    # Default: []
    paths-except: []

    # Predefined exclusion rules.
    # Example:
    #  - comments
    #  - std-error-handling
    #  - common-false-positives
    #  - legacy
    # Default: []
    presets: []

  # All available settings of specific linters.
  settings:
    dupword:
      # Keywords for detecting duplicate words.
      # If this list is not empty, only the words defined in this list will be detected.
      # Default: []
      keywords:
        - "a"
        - "and"
        - "it"
        - "or"
        - "that"
        - "the"

      # Keywords used to ignore detection.
      # Default: []
      ignore:
        - "0C0C"


    errcheck:
      # Report about not checking of errors in type assertions: `a := b.(MyStruct)`.
      # Such cases aren't reported by default.
      # Default: false
      check-type-assertions: false

      # report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`.
      # Such cases aren't reported by default.
      # Default: false
      check-blank: false

      # To disable the errcheck built-in exclude list.
      # See `-excludeonly` option in https://github.com/kisielk/errcheck#excluding-functions for details.
      # Default: false
      disable-default-exclusions: false

      # List of functions to exclude from checking, where each entry is a single function to exclude.
      # See https://github.com/kisielk/errcheck#excluding-functions for details.
      # Example:
      #  - (*io.PipeWriter).CloseWithError
      #  - io/ioutil.ReadFile
      #  - io.Copy(*bytes.Buffer)
      #  - io.Copy(os.Stdout)
      exclude-functions: []

      # Display function signature instead of selector.
      # Default: false
      verbose: true


    errorlint: # Guessing defailts here check if correct
      # Check whether fmt.Errorf uses the %w verb for formatting errors.
      # See the https://github.com/polyfloyd/go-errorlint for caveats.
      # Default: true
      errorf: true

      # Permit more than 1 %w verb, valid per Go 1.20 (requires `errorf: true`).
      # Default: true
      errorf-multi: true

      # Check for plain type assertions and type switches.
      # Default: true
      asserts: true

      # Check for plain error comparisons.
      # Default: true
      comparison: true

      # Allowed errors.
      # Example:
      #  - err: "io.EOF"
      #    fun: "example.com/pkg.Read"
      # Default: []
      allowed-errors: []

      # Allowed error "wildcards".
      # Example:
      #  - err: "example.com/pkg.ErrMagic"
      #    fun: "example.com/pkg.Magic"
      # Default: []
      allowed-errors-wildcard: []


    forbidigo:
      # Forbid the following identifiers (list of regexp).
      # Default: ["^(fmt\\.Print(|f|ln)|print|println)$"]
      forbid:
        - pattern: ioutil\.*
          msg: Do not use ioutil.

        # Built-in bootstrapping functions.
        - pattern: ^print(ln)?$

        # Optional message that gets included in error reports.
        - pattern: ^fmt\.Print.*$
          msg: Do not commit print statements.

        # Alternatively, put messages at the end of the regex, surrounded by `(# )?`.
        # Escape any special characters. Those messages get included in error reports.
        - pattern: 'fmt\.Print.*(# Do not commit print statements\.)?'

        # Forbid spew Dump, whether it is called as function or method.
        # Depends on analyze-types below.
        - pattern: ^spew\.(ConfigState\.)?Dump$

        # The package name might be ambiguous.
        # The full import path can be used as additional criteria.
        # Depends on analyze-types below.
        # - pattern: ^v1.Dump$
        #   pkg: ^example.com/pkg/api/v1$

      # Exclude godoc examples from forbidigo checks.
      # Default: true
      exclude-godoc-examples: false

      # Instead of matching the literal source code,
      # use type information to replace expressions with strings that contain the package name
      # and (for methods and fields) the type name.
      # This makes it possible to handle import renaming and forbid struct fields and methods.
      # Default: false
      analyze-types: false


    goconst:
      # Minimal length of string constant.
      # Default: 3
      min-len: 2

      # Minimum occurrences of constant string count to trigger issue.
      # Default: 3
      min-occurrences: 2

      # Look for existing constants matching the values.
      # Default: true
      match-constant: true

      # Search also for duplicated numbers.
      # Default: false
      numbers: true

      # Minimum value, only works with `goconst.numbers`.
      # Default: 3
      min: 2

      # Maximum value, only works with `goconst.numbers`.
      # Default: 3
      max: 2

      # Ignore when constant is not used as function argument.
      # Default: true
      ignore-calls: true

      # Exclude strings matching the given regular expression.
      # Example:
      #  - 'foo.+'
      # Default: ""
      ignore-string-values:
        - '\b0[xX][0-9a-fA-F]+\b' # This is to ignore hex numbers.

      # Detects constants with identical values.
      # Default: false
      find-duplicates: false

      # Evaluates of constant expressions like Prefix + "suffix".
      # Default: false
      eval-const-expressions: true


    goheader:
      # Supports two types 'const` and `regexp`.
      # Values can be used recursively.
      # Default: {}
      values:
        const:
          # Define here const type values in format k:v.
          APL: Apache License, Version 2.0
          BSL: Business Source License
        regexp:
          # Define here regexp type values.
          ANY-YEAR: (20\d\d)

      # The template used for checking.
      # Put here copyright header template for source code files.
      # Note: {{ YEAR }} is a builtin value that returns the year relative to the current machine time.
      # Default: ""
      template: |-
        Copyright {{ ANY-YEAR }} Democratized Data Foundation

        Use of this software is governed by the {{ BSL }}
        included in the file licenses/BSL.txt.

        As of the Change Date specified in that file, in accordance with
        the {{ BSL }}, use of this software will be governed
        by the {{ APL }}, included in the file
        licenses/APL.txt.

      # As alternative of directive 'template', you may put the path to file with the template source.
      # Useful if you need to load the template from a specific file.
      # By default, if a path is relative, it is relative to the directory where the golangci-lint command is executed.
      # The placeholder '${base-path}' is substituted with path relative to mode defined with `run.relative-path-mode`.
      # The placeholder '${config-path}' is substituted with a path relative to the configuration file.
      # Example: "/path/to/my/template.tmpl"
      # Default: ""
      # Note that if the line below is not commented out, the following verify command will fail:
      # `golangci-lint config verify --config=tools/configs/golangci.yaml`
      # template-path: ""


    govet:
      # Enable all analyzers.
      # Default: false
      enable-all: true

      # Enable analyzers by name.
      # (In addition to default:
      #   appends, asmdecl, assign, atomic, bools, buildtag, cgocall, composites, copylocks, defers, directive,
      #   errorsas, framepointer, httpresponse, ifaceassert, loopclosure, lostcancel, nilfunc, printf, shift,
      #   sigchanyzer, slog, stdmethods, stringintconv, structtag, testinggoroutine, tests, timeformat, unmarshal,
      #   unreachable, unsafeptr, unusedresult).
      # Run `GL_DEBUG=govet golangci-lint run --enable=govet` to see default, available analyzers, & enabled analyzers.
      # Find original possibilities here:
      # github.com/golangci/golangci-lint/blob/f1f8343d12ac33720efeb5898141d1e065789751/.golangci.reference.yml#L1552
      # Current full list of current ones at HEAD:
      # https://github.com/golangci/golangci-lint/blob/HEAD/.golangci.reference.yml#L1618
      # Default: []
      enable: []

      # Disable all analyzers.
      # Default: false
      disable-all: false

      # Disable analyzers by name.
      # (In addition to default
      #   atomicalign, deepequalerrors, fieldalignment, findcall, nilness, reflectvaluecompare, shadow, sortslice,
      #   timeformat, unusedwrite
      # ).
      # Run `GL_DEBUG=govet golangci-lint run --enable=govet` to see default, available analyzers, & enabled analyzers.
      # Find original possibilities here:
      # github.com/golangci/golangci-lint/blob/f1f8343d12ac33720efeb5898141d1e065789751/.golangci.reference.yml#L1650
      # Current full list of current ones at HEAD:
      # https://github.com/golangci/golangci-lint/blob/HEAD/.golangci.reference.yml#L1720
      # Default: []
      disable:
        - shadow
        - fieldalignment

      # Settings per analyzer.
      settings:
        # Analyzer name, run `go tool vet help` to see all analyzers.
        printf:
          # Comma-separated list of print function names to check (see `go tool vet help printf`).
          # Default: []
          funcs:
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Fatalf

        unusedresult:
          # Comma-separated list of functions whose results must be used.
          # (In addition to default: context.WithCancel, context.WithDeadline, context.WithTimeout,
          # context.WithValue, errors.New, fmt.Errorf, fmt.Sprint, fmt.Sprintf, sort.Reverse).
          # Example:
          #  - pkg.MyFunc
          # Default: []
          funcs: []
          # Comma-separated list of names of methods of type func() string whose results must be used.
          # (In addition to default Error,String).
          # Example:
          #  - MyMethod
          # Default: []
          stringmethods: []


    lll:
      # Max line length, lines longer will be reported.
      # '\t' is counted as 1 character by default, and can be changed with the tab-width option.
      # Default: 120.
      line-length: 120

      # Tab width in spaces.
      # Default: 1
      tab-width: 1

    nolintlint:
      # Disable to ensure that all nolint directives actually have an effect.
      # Default: false
      allow-unused: false

      # Enable to require nolint directives to mention the specific linter being suppressed.
      # Default: false
      require-specific: true

      # Enable to require an explanation of nonzero length after each nolint directive.
      # Default: false
      require-explanation: false

      # Exclude following linters from requiring an explanation.
      # Default: []
      allow-no-explanation: []


    revive:
      # Maximum number of open files at the same time.
      # See https://github.com/mgechev/revive#command-line-flags
      # Defaults to unlimited.
      max-open-files: 2048

      # Sets the default severity.
      # See https://github.com/mgechev/revive#configuration
      # Default: warning
      severity: error

      # Enable all available rules.
      # Default: false
      enable-all-rules: false

      # Enable validation of comment directives.
      # See https://github.com/mgechev/revive#comment-directives
      directives:
        - name: specify-disable-reason
          severity: error

      # Sets the default failure confidence.
      # This means that linting errors with less than 0.8 confidence will be ignored.
      # Default: 0.8
      confidence: 0.8

      # Run `GL_DEBUG=revive golangci-lint run --enable-only=revive` to see default, available rules & enabled rules.
      rules:
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#superfluous-else
        - name: superfluous-else
          severity: error
          disabled: false
          exclude: [""]
          arguments:
            - "preserve-scope"

        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#error-strings
        - name: error-strings
          severity: error
          disabled: false
          exclude: [""]
          arguments:
            - "xerrors.New"

        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#use-any
        - name: use-any
          severity: error
          disabled: false
          exclude: [""]

        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#string-format
        - name: string-format
          severity: error
          disabled: false
          exclude: [""]
          arguments:
            - - 'core.WriteError[1].Message'
              - '/^([^A-Z]|$)/'
              - must not start with a capital letter

            - - 'fmt.Errorf[0]'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation

            - - panic
              - '/^[^\n]*$/'
              - must not contain line breaks

            - - 'errors.New'
              - '/^([^A-Z]|$)/'
              - must not start with a capital letter

            - - 'errors.New'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation

            - - 'fmt.Errorf'
              - '/^([^A-Z]|$)/'
              - must not start with a capital letter

            - - 'fmt.Errorf'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation

            - - 'errors.Wrap'
              - '/^([^A-Z]|$)/'
              - must not start with a capital letter

            - - 'errors.Wrap'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation

            - - 'errors.WithStack'
              - '/^([^A-Z]|$)/'
              - must not start with a capital letter

            - - 'errors.WithStack'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation

        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#dot-imports
        - name: dot-imports
          severity: error
          disabled: false
          exclude: [""]
          arguments:
            - allowed-packages: []

        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#duplicated-imports
        - name: duplicated-imports
          severity: error
          disabled: false
          exclude: [""]


    staticcheck:
      # https://staticcheck.dev/docs/configuration/options/#dot_import_whitelist
      # Default: [
      # "github.com/mmcloughlin/avo/build", "github.com/mmcloughlin/avo/operand", "github.com/mmcloughlin/avo/reg"]
      dot-import-whitelist:
        - fmt

      # https://staticcheck.dev/docs/configuration/options/#initialisms
      # Default: ["ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID", "HTML", "HTTP", "HTTPS", "ID", "IP",
      # "JSON", "QPS", "RAM", "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "GID", "UID",
      # "UUID", "URI", "URL", "UTF8", "VM", "XML", "XMPP", "XSRF", "XSS", "SIP", "RTP", "AMQP", "DB", "TS"]
      initialisms: [
        "ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID", "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON",
        "QPS", "RAM", "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "GID", "UID",
        "UUID", "URI", "URL", "UTF8", "VM", "XML", "XMPP", "XSRF", "XSS", "SIP", "RTP", "AMQP", "DB", "TS"
      ]

      # https://staticcheck.dev/docs/configuration/options/#http_status_code_whitelist
      # Default: ["200", "400", "404", "500"]
      http-status-code-whitelist: ["200", "400", "404", "500"]

      # SAxxxx checks in https://staticcheck.dev/docs/configuration/options/#checks
      # Example (to disable some checks): [ "all", "-SA1000", "-SA1001"]
      # Find all possible checks at: https://staticcheck.dev/docs/checks/#
      # Or here: https://github.com/golangci/golangci-lint/blob/main/.golangci.reference.yml
      # Run `GL_DEBUG=staticcheck golangci-lint run --enable=staticcheck` to see all available checks
      # and enabled by config checks.
      # Default: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
      checks:
        # Do all checks except the ones below with `-` sign:
        - all

        # Unnecessarily complex way of printing formatted string.
        # https://staticcheck.dev/docs/checks/#S1038
        - -S1038

        # Incorrect or missing package comment. Atleast one file in package should document it.
        # https://staticcheck.dev/docs/checks/#ST1000
        - -ST1000

        # Poorly chosen identifier. For example we need to fix `DbName` to `DBName`, to enable this.
        # https://staticcheck.dev/docs/checks/#ST1003
        - -ST1003

        # Redundant type in variable declaration.
        # https://staticcheck.dev/docs/checks/#ST1023
        - -ST1023

        # Apply De Morgan's law.
        # https://staticcheck.dev/docs/checks/#QF1001
        - -QF1001

        # Omit embedded fields from selector expression.
        # https://staticcheck.dev/docs/checks/#QF1008
        - -QF1008

        # Omit redundant type from variable declaration.
        # https://staticcheck.dev/docs/checks/#QF1011
        - -QF1011

        # The documentation of an exported function should start with the function's name.
        # https://staticcheck.dev/docs/checks/#ST1020
        - -ST1020

        # The documentation of an exported type should start with type's name.
        # https://staticcheck.dev/docs/checks/#ST1021
        - -ST1021

    unconvert:
      # Remove conversions that force intermediate rounding.
      # Default: false
      fast-math: true

      # Be more conservative (experimental).
      # Default: false
      safe: true


    unused:
      # Mark all struct fields that have been written to as used.
      # Default: true
      field-writes-are-uses: true

      # Treat IncDec statement (e.g. `i++` or `i--`) as both read and write operation instead of just write.
      # Default: false
      post-statements-are-reads: true

      # Mark all exported fields as used.
      # default: true
      exported-fields-are-used: false

      # Mark all function parameters as used.
      # default: true
      parameters-are-used: true

      # Mark all local variables as used.
      # default: true
      local-variables-are-used: false

      # Mark all identifiers inside generated files as used.
      # Default: true
      generated-is-used: true


    whitespace:
      # Enforces newlines (or comments) after every multi-line if statement.
      # Default: false
      multi-if: false

      # Enforces newlines (or comments) after every multi-line function signature.
      # Default: false
      multi-func: false

    # The custom section can be used to define linter plugins to be loaded at runtime.
    # See README documentation for more info.
    # custom:
    #   # Each custom linter should have a unique name.
    #   example:
    #     # The plugin type.
    #     # It can be `goplugin` or `module`.
    #     # Default: goplugin
    #     type: module
    #     # The path to the plugin *.so. Can be absolute or local.
    #     # Required for each custom linter.
    #     path: /path/to/example.so
    #     # The description of the linter.
    #     # Optional.
    #     description: This is an example usage of a plugin linter.
    #     # Intended to point to the repo location of the linter.
    #     # Optional.
    #     original-url: github.com/golangci/example-linter
    #     # Plugins settings/configuration.
    #     # Only work with plugin based on `linterdb.PluginConstructor`.
    #     # Optional.
    #     settings:
    #       foo: bar
