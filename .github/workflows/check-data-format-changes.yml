name: Check Data Format Changes Workflow

on:
  pull_request:
    branches:
      - master
      - develop

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    branches:
      - master
      - develop

jobs:
  check-data-format-changes:
    name: Check data format changes job

    runs-on: runs-on=${{ github.run_id }}-${{ github.run_attempt }}-${{ strategy.job-index }}/\
      spot=pco/cpu=16+32/family=m7*+c7*/extras=s3-cache

    steps:
      - name: Enable RunsOn action
        uses: runs-on/action@v2
        with:
          metrics: cpu,network,memory,disk,io

      - name: Checkout code into the directory
        uses: actions/checkout@v4

      - name: Setup defradb
        uses: ./.github/composites/setup-defradb

      - name: Run data format change detection tests
        run: make test:changes
