Indicate the primary side of a one-to-one relationship.

"""
directive @primary on FIELD_DEFINITION

"""

Allows the explicit definition of relationship attributes instead of using the system generated
 defaults.

"""
directive @relation(
    """
    
    Explicitly define the name of the relationship instead of using the system generated defaults.

    """
    name: String
) on FIELD_DEFINITION

"""
@materialized is a directive that specifies whether a collection is cached or not.
 It will default to true if ommited.  If multiple @materialized directives are provided, they will aggregated
 with OR logic (if any are true, the collection will be cached).
"""
directive @materialized(
    if: Boolean
) on OBJECT

"""
@branchable is a directive that defines whether the history of this collection is tracked
 as a single, verifiable entity or not. It will default to false if ommited.

 If multiple @branchable directives are provided, they will aggregated with OR logic (if any are true, the
 collection history will be tracked).

 The history may be queried like a document history can be queried, for example via 'commits'
 GQL queries.

 Currently this property is immutable and can only be set on collection creation, however
 that will change in the future.
"""
directive @branchable(
    if: Boolean
) on OBJECT

"""

Indicate that a [float!] type is used to store embeddings.

"""
directive @embedding(
    "The fields to pass to the model."
    fields: [String]
    "The template to use with the fields to create the content to feed the model."
    template: String
    "The provider to use for embedding. (ollama, openAI, etc.)"
    provider: String
    "The model to use for embedding. (nomic-embed-text, etc.)"
    model: String
    "The URL of the provider API."
    url: String
) on FIELD_DEFINITION

"""

Set constrains on a field.
"""
directive @constraints(
    "The size constraint for array fields."
    size: Int
) on FIELD_DEFINITION

"Marks a field for searchable encryption, allowing queries on encrypted data."
directive @encryptedIndex(
    "The type of searchable encryption (currently only 'equality' is supported)."
    type: String = "equality"
) on FIELD_DEFINITION